<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <h1>Weather Dashboard</h1>
    <div class="search-box">
      <input id="cityField" type="text" placeholder="Enter city name" autocomplete="off" aria-label="City name" aria-autocomplete="list" aria-controls="cityList">
      <ul id="cityList" class="city-list" role="listbox" aria-label="City suggestions"></ul>
    </div>
    <button class="geo-btn" onclick="locWeather()" aria-label="Use my location to get weather">How's the weather outside?</button>
    <div id="spinner" class="spinner" style="display:none;"></div>
    <div id="weatherBox" class="weather-box" aria-live="polite" aria-label="Weather information">
      <h2 id="locName"></h2>
      <p id="cond"></p>
      <p id="temp"></p>
      <p id="feel"></p>
      <p id="humid"></p>
      <p id="windSpd"></p>
    </div>
  </div>
  <script type="module" src="scripts.js"></script>
</body>
</html>
